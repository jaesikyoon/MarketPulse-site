<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MarketPulse - 관심 종목/주제 편집</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
            line-height: 1.8;
            color: #1a1a2e;
            background: #f8f9fa;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #fff;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        header {
            border-bottom: 2px solid #e9ecef;
            padding-bottom: 20px;
            margin-bottom: 30px;
        }
        h1 { font-size: 1.5rem; color: #16213e; }
        .meta { color: #6c757d; font-size: 0.9rem; margin-top: 4px; }
        h2 {
            font-size: 1.2rem;
            color: #16213e;
            margin-top: 32px;
            margin-bottom: 16px;
            padding-bottom: 8px;
            border-bottom: 1px solid #e9ecef;
        }

        /* PIN 입력 */
        .pin-section {
            background: #f1f3f5;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 24px;
        }
        .pin-section label {
            font-weight: 600;
            font-size: 0.9rem;
            display: block;
            margin-bottom: 8px;
        }
        .pin-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .pin-row input {
            flex: 1;
            max-width: 200px;
            padding: 8px 12px;
            border: 1px solid #dee2e6;
            border-radius: 6px;
            font-size: 0.9rem;
        }
        .pin-status {
            font-size: 0.85rem;
            color: #6c757d;
        }
        .pin-status.saved { color: #37b24d; }

        /* 시장 탭 */
        .market-tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 16px;
        }
        .market-tab {
            padding: 8px 20px;
            border: 1px solid #dee2e6;
            border-radius: 6px 6px 0 0;
            background: #f8f9fa;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            color: #495057;
            border-bottom: none;
        }
        .market-tab.active {
            background: #fff;
            color: #16213e;
            font-weight: 700;
            border-bottom: 2px solid #fff;
            margin-bottom: -1px;
        }

        /* 종목 테이블 */
        .stock-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
            margin-bottom: 8px;
        }
        .stock-table th, .stock-table td {
            border: 1px solid #dee2e6;
            padding: 8px 10px;
            text-align: left;
        }
        .stock-table th {
            background: #f1f3f5;
            font-weight: 600;
            font-size: 0.8rem;
            white-space: nowrap;
        }
        .stock-table td.center { text-align: center; }

        /* 상태 배지 */
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.72rem;
            font-weight: 600;
        }
        .badge-active { background: #d3f9d8; color: #2b8a3e; }
        .badge-inactive { background: #ffe3e3; color: #c92a2a; }
        .badge-market-kr { background: #fef3c7; color: #92400e; }
        .badge-market-us { background: #dbeafe; color: #1e40af; }

        /* 버튼 */
        .btn {
            padding: 4px 10px;
            border: none;
            border-radius: 4px;
            font-size: 0.78rem;
            cursor: pointer;
            font-weight: 500;
            transition: opacity 0.15s;
        }
        .btn:hover { opacity: 0.85; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-toggle { background: #e8f4f8; color: #1971c2; }
        .btn-delete { background: #ffe3e3; color: #c92a2a; }
        .btn-primary {
            background: #1971c2;
            color: #fff;
            padding: 8px 20px;
            font-size: 0.85rem;
        }
        .btn-actions {
            display: flex;
            gap: 4px;
        }

        /* 추가 폼 */
        .add-form {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 20px;
            margin-top: 16px;
        }
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
        }
        .form-group label {
            font-size: 0.82rem;
            font-weight: 600;
            margin-bottom: 4px;
            color: #495057;
        }
        .form-group input,
        .form-group select {
            padding: 8px 12px;
            border: 1px solid #dee2e6;
            border-radius: 6px;
            font-size: 0.9rem;
        }
        .form-actions {
            margin-top: 16px;
            display: flex;
            gap: 8px;
            align-items: center;
        }

        /* 알림 메시지 */
        .alert {
            padding: 10px 16px;
            border-radius: 6px;
            font-size: 0.85rem;
            margin-bottom: 16px;
            display: none;
        }
        .alert-success { background: #d3f9d8; color: #2b8a3e; }
        .alert-error { background: #ffe3e3; color: #c92a2a; }

        /* 로딩 */
        .loading {
            text-align: center;
            color: #6c757d;
            padding: 24px;
            font-size: 0.9rem;
        }

        footer {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #e9ecef;
            text-align: center;
            color: #adb5bd;
            font-size: 0.85rem;
        }
        footer a { color: #6c757d; text-decoration: none; }
        footer a:hover { text-decoration: underline; }

        /* 유형 탭 (종목/주제) */
        .type-tabs {
            display: flex;
            gap: 0;
            margin-bottom: 20px;
            border-bottom: 2px solid #e9ecef;
        }
        .type-tab {
            padding: 10px 24px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.95rem;
            color: #6c757d;
            border-bottom: 3px solid transparent;
            margin-bottom: -2px;
            transition: color 0.15s, border-color 0.15s;
        }
        .type-tab:hover { color: #16213e; }
        .type-tab.active { color: #1971c2; border-bottom-color: #1971c2; }
        .type-panel { display: none; }
        .type-panel.active { display: block; }

        @media (max-width: 600px) {
            .container { padding: 20px; }
            .form-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>관심 종목/주제 편집</h1>
            <div class="meta">종목·주제 추가/삭제/비활성화. 변경사항은 다음 뉴스 수집부터 반영됩니다.</div>
        </header>

        <!-- PIN 입력 -->
        <div class="pin-section">
            <label>PIN 인증</label>
            <div class="pin-row">
                <input type="password" id="pinInput" placeholder="PIN 입력">
                <button class="btn btn-primary" onclick="savePin()">저장</button>
                <span id="pinStatus" class="pin-status"></span>
            </div>
        </div>

        <!-- 알림 -->
        <div id="alertBox" class="alert"></div>

        <!-- 유형 탭 (종목/주제) -->
        <div class="type-tabs">
            <div class="type-tab active" onclick="switchType('stock')">종목</div>
            <div class="type-tab" onclick="switchType('topic')">주제</div>
        </div>

        <!-- ====== 종목 패널 ====== -->
        <div id="typePanel-stock" class="type-panel active">

        <!-- 시장 탭 -->
        <div class="market-tabs">
            <div class="market-tab active" data-market="KR" onclick="switchTab('KR')">KR (한국)</div>
            <div class="market-tab" data-market="US" onclick="switchTab('US')">US (미국)</div>
        </div>

        <!-- 종목 목록 -->
        <div id="stockList">
            <div class="loading">종목 목록을 불러오는 중...</div>
        </div>

        <!-- 종목 추가 폼 -->
        <h2>종목 추가</h2>
        <div class="add-form">
            <div class="form-grid">
                <div class="form-group">
                    <label>종목코드 (ticker)</label>
                    <input type="text" id="addTicker" placeholder="005930 또는 AAPL">
                </div>
                <div class="form-group">
                    <label>종목명</label>
                    <input type="text" id="addName" placeholder="삼성전자 또는 Apple">
                </div>
                <div class="form-group">
                    <label>시장</label>
                    <select id="addMarket">
                        <option value="KR">KR (한국)</option>
                        <option value="US">US (미국)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>섹터</label>
                    <input type="text" id="addSector" placeholder="반도체, 빅테크 등">
                </div>
            </div>
            <div class="form-actions">
                <button class="btn btn-primary" onclick="addItem()">추가</button>
            </div>
        </div>

        </div>

        <!-- ====== 주제 패널 ====== -->
        <div id="typePanel-topic" class="type-panel">

        <!-- 주제 목록 -->
        <div id="topicList">
            <div class="loading">주제 목록을 불러오는 중...</div>
        </div>

        <!-- 주제 추가 폼 -->
        <h2>주제 추가</h2>
        <div class="add-form">
            <div class="form-grid">
                <div class="form-group">
                    <label>주제 ID (영문, 예: ai)</label>
                    <input type="text" id="addTopicId" placeholder="ai, fed_policy 등">
                </div>
                <div class="form-group">
                    <label>주제명</label>
                    <input type="text" id="addTopicName" placeholder="AI/인공지능">
                </div>
                <div class="form-group">
                    <label>카테고리</label>
                    <select id="addTopicCategory">
                        <option value="industry">산업 (industry)</option>
                        <option value="macro">매크로 (macro)</option>
                        <option value="geopolitics">지정학 (geopolitics)</option>
                        <option value="regulation">규제 (regulation)</option>
                        <option value="trend">트렌드 (trend)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>설명 (선택)</label>
                    <input type="text" id="addTopicDesc" placeholder="주제 설명">
                </div>
            </div>
            <div class="form-group" style="margin-top: 8px;">
                <label>검색 쿼리 (JSON, 선택)</label>
                <input type="text" id="addTopicQueries" placeholder='{"KR": ["AI 산업 동향"], "US": ["AI industry news"]}' style="width:100%;">
            </div>
            <div class="form-actions">
                <button class="btn btn-primary" onclick="addTopicItem()">추가</button>
            </div>
        </div>

        </div>

        <footer>
            <a href="index.html">뉴스 대시보드</a> |
            <a href="explore.html">뉴스 탐색</a> |
            <a href="/MarketPulse-site/">브리핑 아카이브</a>
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script>
        // Supabase 초기화 (Jinja2로 주입)
        const SUPABASE_URL = 'https://llriovzjiiravxeufsbu.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_AVzf5BzPmI9NLj-cBKUzFQ_qu8K8xpr';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let currentMarket = 'KR';
        let allItems = [];

        // --- PIN ---
        function getPin() {
            return localStorage.getItem('mp_watchlist_pin') || '';
        }

        function savePin() {
            const pin = document.getElementById('pinInput').value.trim();
            if (!pin) return;
            localStorage.setItem('mp_watchlist_pin', pin);
            document.getElementById('pinInput').value = '';
            const el = document.getElementById('pinStatus');
            el.textContent = 'PIN 저장됨';
            el.className = 'pin-status saved';
        }

        // --- 알림 ---
        function showAlert(msg, type) {
            const el = document.getElementById('alertBox');
            el.textContent = msg;
            el.className = 'alert alert-' + type;
            el.style.display = 'block';
            setTimeout(() => { el.style.display = 'none'; }, 4000);
        }

        // --- 탭 전환 ---
        function switchTab(market) {
            currentMarket = market;
            document.querySelectorAll('.market-tab').forEach(tab => {
                tab.classList.toggle('active', tab.dataset.market === market);
            });
            renderList();
        }

        // --- 목록 로드 ---
        async function loadItems() {
            try {
                const { data, error } = await sb
                    .from('watchlist')
                    .select('*')
                    .order('sort_order', { ascending: true })
                    .order('ticker_name', { ascending: true });

                if (error) throw error;
                allItems = data || [];
                renderList();
            } catch (e) {
                document.getElementById('stockList').innerHTML =
                    '<div class="loading" style="color:#c92a2a;">목록 로드 실패: ' + e.message + '</div>';
            }
        }

        function renderList() {
            const items = allItems.filter(i => i.market === currentMarket);
            const active = items.filter(i => i.is_active);
            const inactive = items.filter(i => !i.is_active);

            if (items.length === 0) {
                document.getElementById('stockList').innerHTML =
                    '<div class="loading">등록된 종목이 없습니다.</div>';
                return;
            }

            let html = '<table class="stock-table"><thead><tr>' +
                '<th>종목코드</th><th>종목명</th><th>섹터</th><th>상태</th><th>관리</th>' +
                '</tr></thead><tbody>';

            // 활성 종목
            for (const item of active) {
                html += buildRow(item);
            }
            // 비활성 종목
            for (const item of inactive) {
                html += buildRow(item);
            }

            html += '</tbody></table>';
            html += '<div style="font-size:0.82rem; color:#6c757d; margin-top:8px;">' +
                '활성 ' + active.length + '개, 비활성 ' + inactive.length + '개</div>';

            document.getElementById('stockList').innerHTML = html;
        }

        function buildRow(item) {
            const statusBadge = item.is_active
                ? '<span class="badge badge-active">활성</span>'
                : '<span class="badge badge-inactive">비활성</span>';
            const toggleLabel = item.is_active ? '비활성화' : '활성화';
            const rowStyle = item.is_active ? '' : ' style="opacity:0.5;"';

            return '<tr' + rowStyle + '>' +
                '<td>' + escapeHtml(item.ticker) + '</td>' +
                '<td><strong>' + escapeHtml(item.ticker_name) + '</strong></td>' +
                '<td>' + escapeHtml(item.sector || '-') + '</td>' +
                '<td class="center">' + statusBadge + '</td>' +
                '<td class="center"><div class="btn-actions">' +
                '<button class="btn btn-toggle" onclick="toggleItem(\'' +
                    escapeHtml(item.ticker) + "','" + escapeHtml(item.market) +
                    '\')">' + toggleLabel + '</button>' +
                '<button class="btn btn-delete" onclick="removeItem(\'' +
                    escapeHtml(item.ticker) + "','" + escapeHtml(item.market) + "','" +
                    escapeHtml(item.ticker_name) +
                    '\')">삭제</button>' +
                '</div></td></tr>';
        }

        // --- RPC 호출 ---
        async function toggleItem(ticker, market) {
            const pin = getPin();
            if (!pin) { showAlert('PIN을 먼저 입력하세요.', 'error'); return; }

            try {
                const { data, error } = await sb.rpc('toggle_watchlist_item', {
                    p_pin: pin, p_ticker: ticker, p_market: market
                });
                if (error) throw error;
                if (data && data.success === false) {
                    showAlert(data.error, 'error');
                    return;
                }
                const newState = data.is_active ? '활성화' : '비활성화';
                showAlert(ticker + ' ' + newState + ' 완료', 'success');
                await loadItems();
            } catch (e) {
                showAlert('토글 실패: ' + e.message, 'error');
            }
        }

        async function removeItem(ticker, market, name) {
            if (!confirm(name + ' (' + ticker + ')을(를) 삭제하시겠습니까?')) return;

            const pin = getPin();
            if (!pin) { showAlert('PIN을 먼저 입력하세요.', 'error'); return; }

            try {
                const { data, error } = await sb.rpc('remove_watchlist_item', {
                    p_pin: pin, p_ticker: ticker, p_market: market
                });
                if (error) throw error;
                if (data && data.success === false) {
                    showAlert(data.error, 'error');
                    return;
                }
                showAlert(name + ' 삭제 완료', 'success');
                await loadItems();
            } catch (e) {
                showAlert('삭제 실패: ' + e.message, 'error');
            }
        }

        async function addItem() {
            const pin = getPin();
            if (!pin) { showAlert('PIN을 먼저 입력하세요.', 'error'); return; }

            const ticker = document.getElementById('addTicker').value.trim();
            const name = document.getElementById('addName').value.trim();
            const market = document.getElementById('addMarket').value;
            const sector = document.getElementById('addSector').value.trim();

            if (!ticker || !name) {
                showAlert('종목코드와 종목명은 필수입니다.', 'error');
                return;
            }

            try {
                const { data, error } = await sb.rpc('add_watchlist_item', {
                    p_pin: pin,
                    p_ticker: ticker,
                    p_ticker_name: name,
                    p_market: market,
                    p_sector: sector || null
                });
                if (error) throw error;
                if (data && data.success === false) {
                    showAlert(data.error, 'error');
                    return;
                }
                showAlert(name + ' (' + ticker + ') 추가 완료', 'success');
                document.getElementById('addTicker').value = '';
                document.getElementById('addName').value = '';
                document.getElementById('addSector').value = '';
                await loadItems();
            } catch (e) {
                showAlert('추가 실패: ' + e.message, 'error');
            }
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // --- 유형 탭 전환 ---
        function switchType(type) {
            document.querySelectorAll('.type-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.type-panel').forEach(p => p.classList.remove('active'));
            document.getElementById('typePanel-' + type).classList.add('active');
            event.target.classList.add('active');
            if (type === 'topic' && topicItems.length === 0) loadTopicItems();
        }

        // --- 주제 관리 ---
        let topicItems = [];

        async function loadTopicItems() {
            try {
                const { data, error } = await sb
                    .from('topic_watchlist')
                    .select('*')
                    .order('sort_order', { ascending: true })
                    .order('topic_name', { ascending: true });
                if (error) throw error;
                topicItems = data || [];
                renderTopicList();
            } catch (e) {
                document.getElementById('topicList').innerHTML =
                    '<div class="loading" style="color:#c92a2a;">주제 목록 로드 실패: ' + e.message + '</div>';
            }
        }

        const TOPIC_CAT_LABELS = {
            industry: '산업', macro: '매크로', geopolitics: '지정학',
            regulation: '규제', trend: '트렌드'
        };

        function renderTopicList() {
            if (topicItems.length === 0) {
                document.getElementById('topicList').innerHTML =
                    '<div class="loading">등록된 주제가 없습니다.</div>';
                return;
            }
            const active = topicItems.filter(i => i.is_active);
            const inactive = topicItems.filter(i => !i.is_active);

            let html = '<table class="stock-table"><thead><tr>' +
                '<th>주제 ID</th><th>주제명</th><th>카테고리</th><th>상태</th><th>관리</th>' +
                '</tr></thead><tbody>';
            for (const item of active) html += buildTopicRow(item);
            for (const item of inactive) html += buildTopicRow(item);
            html += '</tbody></table>';
            html += '<div style="font-size:0.82rem; color:#6c757d; margin-top:8px;">' +
                '활성 ' + active.length + '개, 비활성 ' + inactive.length + '개</div>';
            document.getElementById('topicList').innerHTML = html;
        }

        function buildTopicRow(item) {
            const statusBadge = item.is_active
                ? '<span class="badge badge-active">활성</span>'
                : '<span class="badge badge-inactive">비활성</span>';
            const toggleLabel = item.is_active ? '비활성화' : '활성화';
            const rowStyle = item.is_active ? '' : ' style="opacity:0.5;"';
            const catLabel = TOPIC_CAT_LABELS[item.topic_category] || item.topic_category;

            return '<tr' + rowStyle + '>' +
                '<td>' + escapeHtml(item.topic_id) + '</td>' +
                '<td><strong>' + escapeHtml(item.topic_name) + '</strong></td>' +
                '<td>' + escapeHtml(catLabel) + '</td>' +
                '<td class="center">' + statusBadge + '</td>' +
                '<td class="center"><div class="btn-actions">' +
                '<button class="btn btn-toggle" onclick="toggleTopicItem(\'' +
                    escapeHtml(item.topic_id) + '\')">' + toggleLabel + '</button>' +
                '<button class="btn btn-delete" onclick="removeTopicItem(\'' +
                    escapeHtml(item.topic_id) + "','" + escapeHtml(item.topic_name) +
                    '\')">삭제</button>' +
                '</div></td></tr>';
        }

        async function toggleTopicItem(topicId) {
            const pin = getPin();
            if (!pin) { showAlert('PIN을 먼저 입력하세요.', 'error'); return; }
            try {
                const { data, error } = await sb.rpc('toggle_topic_watchlist_item', {
                    p_pin: pin, p_topic_id: topicId
                });
                if (error) throw error;
                if (data && data.success === false) { showAlert(data.error, 'error'); return; }
                const newState = data.is_active ? '활성화' : '비활성화';
                showAlert(topicId + ' ' + newState + ' 완료', 'success');
                await loadTopicItems();
            } catch (e) { showAlert('토글 실패: ' + e.message, 'error'); }
        }

        async function removeTopicItem(topicId, name) {
            if (!confirm(name + ' (' + topicId + ')을(를) 삭제하시겠습니까?')) return;
            const pin = getPin();
            if (!pin) { showAlert('PIN을 먼저 입력하세요.', 'error'); return; }
            try {
                const { data, error } = await sb.rpc('remove_topic_watchlist_item', {
                    p_pin: pin, p_topic_id: topicId
                });
                if (error) throw error;
                if (data && data.success === false) { showAlert(data.error, 'error'); return; }
                showAlert(name + ' 삭제 완료', 'success');
                await loadTopicItems();
            } catch (e) { showAlert('삭제 실패: ' + e.message, 'error'); }
        }

        async function addTopicItem() {
            const pin = getPin();
            if (!pin) { showAlert('PIN을 먼저 입력하세요.', 'error'); return; }
            const topicId = document.getElementById('addTopicId').value.trim();
            const name = document.getElementById('addTopicName').value.trim();
            const category = document.getElementById('addTopicCategory').value;
            const desc = document.getElementById('addTopicDesc').value.trim();
            const queriesStr = document.getElementById('addTopicQueries').value.trim();

            if (!topicId || !name) {
                showAlert('주제 ID와 주제명은 필수입니다.', 'error');
                return;
            }
            let queries = null;
            if (queriesStr) {
                try { queries = JSON.parse(queriesStr); }
                catch (e) { showAlert('검색 쿼리 JSON 형식이 잘못되었습니다.', 'error'); return; }
            }
            try {
                const { data, error } = await sb.rpc('add_topic_watchlist_item', {
                    p_pin: pin,
                    p_topic_id: topicId,
                    p_topic_name: name,
                    p_topic_category: category,
                    p_description: desc || null,
                    p_search_queries: queries
                });
                if (error) throw error;
                if (data && data.success === false) { showAlert(data.error, 'error'); return; }
                showAlert(name + ' (' + topicId + ') 추가 완료', 'success');
                document.getElementById('addTopicId').value = '';
                document.getElementById('addTopicName').value = '';
                document.getElementById('addTopicDesc').value = '';
                document.getElementById('addTopicQueries').value = '';
                await loadTopicItems();
            } catch (e) { showAlert('추가 실패: ' + e.message, 'error'); }
        }

        // --- 초기화 ---
        (function init() {
            // 저장된 PIN 표시
            if (getPin()) {
                const el = document.getElementById('pinStatus');
                el.textContent = 'PIN 저장됨';
                el.className = 'pin-status saved';
            }
            loadItems();
        })();
    </script>
</body>
</html>
